name: ghost-in-the-data-dev

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: ghost
      POSTGRES_DB: ghost
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: ghost-in-the-data-backend-dev
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql+asyncpg://ghost:ghost@db:5432/ghost
    depends_on:
      - db

  frontend:
    image: ghost-in-the-data-frontend-dev
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:8000/api
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  pg_data:
